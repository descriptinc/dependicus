name: CI

on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    MISE_NODE_VERSION: '20'

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v2
            - run: pnpm install
            - run: mise run pnpm:typecheck
            - run: mise run pnpm:test

    check-bun:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v2
            - run: bun install
            - run: mise run bun:typecheck
            - run: mise run bun:test

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v2
            - run: pnpm install
            - run: pnpm run format:check
            - run: pnpm run lint
            - run: node --import tsx scripts/check-catalog-sync.ts

    lint-bun:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v2
            - run: bun install
            - run: bun run format:check
            - run: bun run lint
            - run: node --import tsx scripts/check-catalog-sync.ts

    zensical:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v2
            - run: uv run zensical build
              working-directory: docs
            - uses: actions/upload-artifact@v4
              with:
                  name: zensical
                  path: docs/site

    typedoc:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v2
            - run: pnpm install
            - run: pnpm run typedoc
              working-directory: packages/dependicus
            - uses: actions/upload-artifact@v4
              with:
                  name: typedoc
                  path: packages/dependicus/typedoc-out

    typedoc-bun:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v2
            - run: bun install
            - run: mise run bun:build
            - run: bun run typedoc
              working-directory: packages/dependicus
            - uses: actions/upload-artifact@v4
              with:
                  name: typedoc-bun
                  path: packages/dependicus/typedoc-out

    dependicus:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v2
            - run: pnpm install
            - run: mise run pnpm:build
            - uses: actions/cache@v4
              with:
                  path: .dependicus-cache
                  key: dependicus-cache-${{ github.sha }}
                  restore-keys: dependicus-cache-
            - run: node packages/dependicus/dist/bin.mjs update --html
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - uses: actions/upload-artifact@v4
              with:
                  name: dependicus
                  path: dependicus-out

    dependicus-bun:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v2
            - run: bun install
            - run: mise run bun:build
            - uses: actions/cache@v4
              with:
                  path: .dependicus-cache
                  key: dependicus-bun-cache-${{ github.sha }}
                  restore-keys: dependicus-bun-cache-
            - run: bun run packages/dependicus/dist/bin.mjs update --html
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - uses: actions/upload-artifact@v4
              with:
                  name: dependicus-bun
                  path: dependicus-out

    github-issues:
        if: github.ref == 'refs/heads/main'
        needs: [check, lint, dependicus]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            issues: write
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v2
            - run: pnpm install
            - run: mise run pnpm:build
            - uses: actions/cache@v4
              with:
                  path: .dependicus-cache
                  key: dependicus-cache-${{ github.sha }}
                  restore-keys: dependicus-cache-
            - uses: actions/download-artifact@v4
              with:
                  name: dependicus
                  path: dependicus-out
            - run: node packages/dependicus/dist/bin.mjs make-github-issues
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    deploy:
        if: github.ref == 'refs/heads/main'
        needs:
            [
                check,
                check-bun,
                lint,
                lint-bun,
                zensical,
                typedoc,
                typedoc-bun,
                dependicus,
                dependicus-bun,
            ]
        runs-on: ubuntu-latest
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: zensical
                  path: site
            - uses: actions/download-artifact@v4
              with:
                  name: typedoc
                  path: site/api
            - uses: actions/download-artifact@v4
              with:
                  name: dependicus
                  path: site/dependencies
            - uses: actions/download-artifact@v4
              with:
                  name: typedoc-bun
                  path: site/bun/api
            - uses: actions/download-artifact@v4
              with:
                  name: dependicus-bun
                  path: site/bun/dependencies
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: site
            - id: deployment
              uses: actions/deploy-pages@v4
