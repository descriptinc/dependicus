name: Publish

on:
    push:
        tags: ['v*']

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v2
            - run: pnpm install
            - run: pnpm run build
            - run: pnpm run bundle
            - name: Publish to NPM
              env:
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: pnpm publish --no-git-checks --provenance
