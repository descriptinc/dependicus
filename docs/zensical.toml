[project]
site_name = "Dependicus"
repo_url = "https://github.com/descriptinc/dependicus"
repo_name = "descriptinc/dependicus"
edit_uri = "edit/main/docs/docs/"
nav = [
    { "Docs" = [
        { "Home" = "index.md" },
        "gettingstarted.md",
        "configuration.md",
        "plugins.md",
        "compliance.md",
        { "Linear Tickets" = "lineartickets.md" },
        "ci.md",
        { "Using Coding Agents" = "coding-agents.md" },
        { "Contributing" = "contributing.md" },
    ] },
    { "Comparisons" = [
        { "vs Renovate" = "dependicus-vs-renovate.md" },
        { "vs Dependabot" = "dependicus-vs-dependabot.md" },
    ] },
    { "API" = "/api/" },
    { "Dependencies" = "/dependencies/" },
]

[project.theme]
logo = "images/logo.svg"
favicon = "images/logo.svg"
features = ["navigation.footer", "navigation.tabs", "content.action.edit", "content.action.view"]
