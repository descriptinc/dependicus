min_version = "2026.3.4"

[tools]
bun = "1.3"
go = "1.24"
hk = "1.36.0"
jq = "latest"
node = "22"
pkl = "0.30.2"
pnpm = "10.27.0"
rust = "latest"
uv = "0.10.7"
yarn = "4"


[tasks.docs]
description = "Build unified docs site (zensical + typedoc + dependicus) into docs-out/"
depends = ["docs:zensical", "docs:typedoc", "docs:dependicus"]
run = "rm -rf docs-out && cp -r docs/site docs-out && cp -r packages/dependicus/typedoc-out docs-out/api && cp -r dependicus-out docs-out/dependencies"

[tasks."docs:zensical"]
description = "Build zensical docs"
dir = "{{config_root}}/docs"
run = "uv run zensical build"

[tasks."docs:typedoc"]
description = "Build typedoc API reference"
dir = "{{config_root}}/packages/dependicus"
run = "pnpm run typedoc"

[tasks."docs:dependicus"]
description = "Run dependicus on itself"
run = "node packages/dependicus/dist/bin.mjs update --html --provider pnpm --provider bun --provider yarn --provider npm --provider mise --provider uv --provider go --provider rust"

[tasks."pnpm:build"]
description = "Build all packages with pnpm"
run = "pnpm -r run build"

[tasks."pnpm:test"]
description = "Run all tests with pnpm"
run = "pnpm -r run test"

[tasks."pnpm:typecheck"]
description = "Typecheck all packages with pnpm"
depends = ["pnpm:build"]
run = "pnpm -r run typecheck"

[tasks."pnpm:clean"]
description = "Clean all packages with pnpm"
run = "pnpm -r run clean"

[tasks."bun:build"]
description = "Build all packages with bun"
run = "bun run --filter '*' build"

[tasks."bun:test"]
description = "Run all tests with bun"
run = "bun run --filter '*' test"

[tasks."bun:typecheck"]
description = "Typecheck all packages with bun"
depends = ["bun:build"]
run = "bun run --filter '*' typecheck"

[tasks."bun:clean"]
description = "Clean all packages with bun"
run = "bun run --filter '*' clean"

[tasks."npm:build"]
description = "Build all packages with npm"
run = "npm run --workspaces build"

[tasks."npm:test"]
description = "Run all tests with npm"
run = "npm run --workspaces test"

[tasks."npm:typecheck"]
description = "Typecheck all packages with npm"
depends = ["npm:build"]
run = "npm run --workspaces typecheck"

[tasks."npm:clean"]
description = "Clean all packages with npm"
run = "npm run --workspaces clean"

[tasks."yarn:build"]
description = "Build all packages with yarn"
run = "yarn workspaces foreach -A run build"

[tasks."yarn:test"]
description = "Run all tests with yarn"
run = "yarn workspaces foreach -A run test"

[tasks."yarn:typecheck"]
description = "Typecheck all packages with yarn"
depends = ["yarn:build"]
run = "yarn workspaces foreach -A run typecheck"

[tasks."yarn:clean"]
description = "Clean all packages with yarn"
run = "yarn workspaces foreach -A run clean"

[tasks."switch:pnpm"]
description = "Delete node_modules and reinstall with pnpm"
run = "bash scripts/switch-pm.sh pnpm"

[tasks."switch:bun"]
description = "Delete node_modules and reinstall with bun"
run = "bash scripts/switch-pm.sh bun"

[tasks."switch:npm"]
description = "Delete node_modules and reinstall with npm"
run = "bash scripts/switch-pm.sh npm"

[tasks."switch:yarn"]
description = "Delete node_modules and reinstall with yarn"
run = "bash scripts/switch-pm.sh yarn"

[tasks.which-pm]
description = "Show which package manager installed node_modules"
run = "cat .package-manager 2>/dev/null || echo 'unknown (run switch:pnpm, switch:bun, switch:npm, or switch:yarn first)'"

[tasks.check-versions]
description = "Ensure no dependency appears with multiple version ranges across workspaces"
run = """
mismatches=$(jq -rn '
  [inputs | (.dependencies // {}) + (.devDependencies // {}) | to_entries[]
    | select(.value | startswith("workspace:") | not)
    | {name: .key, version: .value}]
  | group_by(.name)
  | map(select(map(.version) | unique | length > 1))
  | map("  \\(.[0].name): \\(map(.version) | unique | join(", "))")
  | join("\\n")
' package.json packages/*/package.json)
if [ -z "$mismatches" ]; then
  echo "All dependency versions are consistent."
else
  echo "Version mismatches found:"
  echo "$mismatches"
  exit 1
fi
"""

[tasks.update-all-lockfiles]
description = "Regenerate lockfiles for all package managers, ending on pnpm"
run = """
for pm in npm yarn bun pnpm; do
  echo "=== Switching to $pm ==="
  bash scripts/switch-pm.sh "$pm"
done
"""

[tasks.release]
description = "Build, test, and publish dependicus to NPM"
depends = ["pnpm:build", "pnpm:test", "pnpm:typecheck"]
dir = "{{config_root}}/packages/dependicus"
interactive = true
run = "pnpm publish"

[tasks.delete-node-modules]
description = "Delete all node_modules directories"
run = "rm -rf node_modules packages/*/node_modules"
